---
# Build → push → GitOps tag-bump for rapid-cdl-admin.
name: Build and deploy (GitOps)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write        # push the tag-bump commit back to main
  packages: write        # push the image to ghcr.io

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name + tag
        id: img
        run: |
          echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-$(git rev-parse --short HEAD)"   >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64        # K3s node is amd64 (NeCTAR Ubuntu amd64)
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }}
            ${{ steps.img.outputs.name }}:latest
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_API_TOKEN=${{ secrets.VITE_API_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kustomize
        run: |
          curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Pin image tag in k8s/kustomization.yaml
        working-directory: k8s
        run: |
          kustomize edit set image \
            "rapid-cdl-admin=${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }}"

      - name: Commit the tag bump (triggers Argo CD)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/kustomization.yaml; then
            echo "No image change; nothing to commit."
            exit 0
          fi
          git add k8s/kustomization.yaml
          git commit -m "ci: deploy ${{ steps.img.outputs.tag }} [skip ci]"
          git push origin HEAD:main
